# ===========================================
# CertMonitor 后端服务配置文件
# ===========================================

app:
  name: "certmonitor"
  port: 8080
  mode: "debug"  # debug / release / test
  secret: "your-secret-key-change-in-production"

# MySQL 数据库配置
database:
  driver: "mysql"
  host: "127.0.0.1"
  port: 3306
  username: "root"
  password: "CertMonitor@2024"
  dbname: "certmonitor"
  charset: "utf8mb4"
  max_idle_conns: 10
  max_open_conns: 100
  log_level: "info"  # silent / error / warn / info

# Redis 缓存配置
redis:
  host: "127.0.0.1"
  port: 6379
  password: ""
  db: 0
  pool_size: 100

# JWT 认证配置
jwt:
  secret: "jwt-secret-key-change-in-production"
  expire_hours: 24
  issuer: "certmonitor"

# 日志配置
log:
  level: "debug"  # debug / info / warn / error
  format: "console"  # console / json
  path: "./logs"
  max_size: 100  # MB
  max_backups: 7
  max_age: 30  # days
  compress: true

# 邮件配置 (SMTP)
mail:
  enabled: false
  smtp_host: "smtp.example.com"
  smtp_port: 587
  smtp_user: "noreply@example.com"
  smtp_pass: ""
  from_name: "CertMonitor"
  from_addr: "noreply@example.com"

# 短信配置
sms:
  enabled: false
  provider: "dummy"  # dummy / aliyun / tencent
  access_key: ""
  secret_key: ""
  sign_name: "CertMonitor"
  template_code: ""

# SSO 单点登录配置
sso:
  enabled: false
  provider: "oidc"  # oidc / oauth2 / cas
  client_id: ""
  client_secret: ""
  redirect_uri: "http://localhost:8080/api/v1/auth/sso/callback"
  auth_url: ""
  token_url: ""
  user_info_url: ""
  default_role_id: 5  # 默认 viewer 角色
  allow_password_login: true

# 备案查询接口配置 (公网探测用)
icp_api:
  key: ""
  url: ""

# 探测引擎配置 (Python爬虫服务)
crawler:
  api_host: "http://127.0.0.1"
  api_port: 8000
  timeout: 300  # 秒

# 文件存储配置
storage:
  type: "local"  # local / s3 / oss
  path: "./uploads"
  max_upload_size: 10485760  # 10MB
  allowed_extensions:
    - ".xlsx"
    - ".xls"
    - ".csv"
    - ".pem"
    - ".crt"
    - ".key"
    - ".pfx"
    - ".zip"

# 前端URL(用于CORS和邮件链接等)
frontend:
  url: "http://localhost:5173"
