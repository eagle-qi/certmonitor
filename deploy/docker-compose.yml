# ===========================================
# CertMonitor 一键部署配置
# ===========================================
# 使用方式: docker-compose up -d
# 包含服务:
#   1. certmonitor-go    - Go 后端API服务
#   2. certmonitor-crawler - Python探测引擎
#   3. mysql              - MySQL 8.0 数据库
#   4. redis              - Redis 缓存
#   5. nginx              - Nginx 反向代理(含前端静态资源)
#
# 环境变量: 从 .env 文件自动加载
#

version: '3.8'

services:

  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: certmonitor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-CertMonitor@2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-certmonitor}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-33306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./mysql/conf.d:/etc/mysql/conf.d
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=500
      --innodb-buffer-pool-size=512M
      --slow-query-log=1
      --slow-query-log=1
      --long-query-time=2
      --slow-query-log-file=/var/log/mysql/slow.log
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - certmonitor-net

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: certmonitor-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-36379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - certmonitor-net

  # ==================== Go 后端 API 服务 ====================
  certmonitor-go:
    build:
      context: ../backend
      dockerfile: ../deploy/docker/Dockerfile.backend
    container_name: certmonitor-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_PORT: 8080
      APP_SECRET: ${APP_SECRET:-change-me-in-production}

      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-CertMonitor@2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-certmonitor}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      JWT_SECRET: ${JWT_SECRET:-change-jwt-secret-in-production}
      JWT_EXPIRE_HOURS: 24

      LOG_LEVEL: info

      CRAWLER_API_HOST: certmonitor-crawler
      CRAWLER_API_PORT: 8000

      FRONTEND_URL: http://localhost:${NGINX_PORT:-8880}
    ports:
      - "${GO_PORT:-8080}:8080"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    networks:
      - certmonitor-net

  # ==================== Python 探测引擎 ====================
  certmonitor-crawler:
    build:
      context: ../crawler
      dockerfile: ../deploy/docker/Dockerfile.crawler
    container_name: certmonitor-crawler
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "false"
      LOG_LEVEL: INFO

      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-CertMonitor@2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-certmonitor}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      CERT_OUTPUT_DIR: /app/output/certs
    ports:
      - "${CRAWLER_PORT:-8000}:8000"
    volumes:
      - cert_output_data:/app/output/certs
    networks:
      - certmonitor-net

  # ==================== Nginx 前端 + API网关 (已禁用) ====================
  # 如需启用，取消注释以下配置并确保 SSL 证书就绪
  # nginx:
  #   image: nginx:alpine
  #   container_name: certmonitor-nginx
  #   restart: unless-stopped
  #   depends_on:
  #     - certmonitor-go
  #   ports:
  #     - "${NGINX_PORT:-8880}:80"
  #     - "${NGINX_SSL_PORT:-38443}:443"
  #   volumes:
  #     - ./docker/docker-entrypoint-nginx.sh:/docker-entrypoint-custom.sh:ro
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/conf.d:/etc/nginx/conf.d:ro
  #     - ../frontend/dist:/usr/share/nginx/html:ro
  #     - ssl_certs:/etc/nginx/ssl
  #     - nginx_logs:/var/log/nginx
  #   entrypoint: ["/bin/sh", "/docker-entrypoint-custom.sh"]
  #   networks:
  #     - certmonitor-net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
  cert_output_data:
    driver: local

networks:
  certmonitor-net:
    driver: bridge
